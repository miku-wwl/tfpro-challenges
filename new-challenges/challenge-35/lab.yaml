id: challenge-35
title: 双 State 跨区域计算合同交付
score: 96
alignment: A
exam_timebox: 75m
study_timebox: 135m
runtime: localstack
services: [ec2, iam, s3, sts]
concepts:
  - partial-s3-backend
  - terraform-remote-state
  - provider-aliases
  - external-network-data
  - versioned-contracts
  - static-module-routing
  - stable-for-each
  - saved-plan-json
  - drift-recovery
objectives:
  - Publish an official-resource compute contract from an isolated S3 state
  - Consume the contract through S3 terraform_remote_state
  - Route data sources and modules through explicit primary and DR providers
  - Normalize CSV into stable name@location fleet identities
  - Prove saved-plan delivery, reorder stability, drift recovery, and reverse destroy
invariants:
  - Foundation and fleet use separate partial S3 backends
  - Candidate contains HCL only and manages no VPC or subnet
  - Every AWS request uses loopback LocalStack and literal test credentials
  - No capacity emulation, terraform_data, ignore_changes, or mock provider
  - Final plans are clean and LocalStack has zero run-scoped residue
