id: challenge-31
title: CSV 驱动的官方 EC2 发布图
score: 95
alignment: A
exam_timebox: 70m
study_timebox: 120m
runtime:
  terraform: "~> 1.6"
  provider: "hashicorp/aws ~> 5.100.0"
  target: localstack
  services: [ec2, sts]
objectives:
  - Normalize a six-field fleet CSV into validated deterministic collections
  - Resolve AMI and grader-owned subnet facts through official AWS data sources
  - Build security groups, launch templates, and one EC2 instance per stable fleet key
  - Prove row-order independence, referential integrity, and drift repair
invariants:
  - fleet_id is the only resource identity and duplicate active IDs are rejected
  - disabled and non-target-environment rows never enter the resource graph
  - the candidate never manages VPC or subnet resources and implements no custom capacity controller
  - all AWS traffic is restricted to a loopback LocalStack endpoint with literal test credentials
