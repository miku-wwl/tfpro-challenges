id: challenge-37
title: 官方 AWS Security Group Rule 编译与漂移修复
score: 95
alignment: A
exam_timebox: 65m
study_timebox: 110m
runtime:
  terraform: "~> 1.6"
  provider: "hashicorp/aws ~> 5.100.0"
  target: localstack
  services: [ec2, sts]
objectives:
  - Normalize a weakly typed ingress CSV into a deterministic security-rule model
  - Query a grader-owned subnet and compile rules into aws_vpc_security_group_ingress_rule
  - Detect duplicate identities, duplicate tuples, and invalid protocol or port boundaries
  - Audit plan JSON and repair an out-of-band remote rule deletion
invariants:
  - rule_id and the normalized protocol/port/CIDR tuple are independently unique
  - CSV row order never changes rule resource addresses
  - the candidate never manages VPC or subnet resources
  - the managed security group carries the exact grader RunId
  - all AWS traffic is restricted to a loopback LocalStack endpoint with literal test credentials
