id: challenge-32
title: 敏感启动数据与工作负载身份边界审计
score: 95
timebox: 115m
runtime:
  terraform: "~> 1.6"
  provider: "hashicorp/aws ~> 5.100.0"
  target: localstack
  services: [ec2, iam, sts]
objectives:
  - Model complex bootstrap input as sensitive data and preserve sensitivity propagation
  - Build an EC2 role, least-privilege policy, instance profile, and launch template
  - Distinguish human plan redaction from plan JSON and state storage facts
  - Apply a reviewed saved plan and expose only a non-secret digest
invariants:
  - human-readable plans never print bootstrap token or password
  - plan JSON and state are treated as sensitive artifacts because launch-template user_data contains the payload
  - IAM actions and parameter ARNs are narrowly scoped with no wildcard
  - all AWS calls use literal test credentials and a loopback LocalStack endpoint
