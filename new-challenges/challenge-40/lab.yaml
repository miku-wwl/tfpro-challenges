id: challenge-40
title: 双 State 制品合同与跨区域滚动发布 Capstone
score: 97
alignment: A
exam_timebox: 85m
study_timebox: 150m
runtime: localstack
services: [s3, ec2, iam, sts]
concepts:
  - partial-s3-backend
  - terraform-remote-state
  - versioned-release-contract
  - provider-aliases
  - external-network-data
  - stable-for-each
  - saved-plan-json
  - controlled-rollout
  - drift-recovery
objectives:
  - Publish and validate a digest-bound artifact contract from one S3 state
  - Consume the contract from an isolated runtime S3 state
  - Route official EC2 resources across static primary and DR module slots
  - Audit the real Terraform 1.6 provider action contract for a v1 to v2 rollout
  - Prove reorder stability, drift repair, reverse destroy, and zero residue
invariants:
  - Candidate contains HCL only and manages no VPC or subnet
  - Candidate uses no terraform_data, mocks, capacity emulation, or ignore_changes
  - Every AWS request uses loopback LocalStack and literal test credentials
  - Artifact and runtime states remain isolated in separate S3 keys
  - Boot-time release changes replace instances with create-before-destroy ordering
  - Final plans are clean and LocalStack has zero run-scoped residue
