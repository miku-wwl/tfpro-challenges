id: challenge-25
title: 声明式接管与版本化 S3 配置恢复
score: 96
alignment: A
timebox: 80m
runtime: localstack
terraform_version: "~> 1.6"
services:
  - s3
  - sts
objectives:
  - "1e: 用 Terraform 1.6 import block 接管预存 S3 bucket 并恢复 object 漂移"
  - "1b/1c/1d: 审计并应用 initial、upgrade、repair 与 destroy saved plans"
  - "2a/2c/2d/2e: 使用 JSON functions、for_each、replace_triggered_by 和 conditions"
invariants:
  - managed_aws_types_are_only_s3_bucket_and_s3_object
  - no_manual_state_commands_or_candidate_scripts
  - no_dynamodb_terraform_data_or_prevent_destroy_cleanup_drill
  - initial_plan_imports_without_recreating_bucket
  - upgrade_updates_revision_pointer_replaces_current_and_rotates_one_revision
  - refresh_only_and_repair_touch_only_current_object
  - terraform_1_6_tests_use_no_mock_or_override
  - saved_destroy_leaves_zero_s3_residue
