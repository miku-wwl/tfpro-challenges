id: challenge-36
title: S3 制品清单与可复现发布
score: 94
timebox: 60m
study_time: 100m
runtime:
  terraform: "~> 1.6"
  provider: "hashicorp/aws ~> 5.100.0"
  target: localstack
  services: [s3, sts]
objectives:
  - Decode and normalize a JSON artifact manifest into deterministic collections
  - Publish content-addressed local artifacts as stable S3 object resources
  - Audit saved-plan JSON and prove variable snapshot semantics
  - Detect and repair remote object drift without changing resource identity
invariants:
  - artifact_id and object_key are independently unique among enabled artifacts
  - manifest row order never changes Terraform resource addresses
  - every enabled source stays below artifact_root and exists before planning
  - object checksum, content type, metadata, tags, and remote bytes match the manifest
  - all AWS traffic is restricted to a loopback LocalStack endpoint with literal test credentials
