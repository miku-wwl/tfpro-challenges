id: challenge-22
title: Partial S3 Backend Migration and Cross-State Release Contract
score: 96
alignment: A
exam_timebox: 70m
study_timebox: 125m
terraform_version: "~> 1.6"
runtime: localstack
services:
  - s3
  - dynamodb
  - sts
concepts:
  - partial-s3-backend
  - local-to-remote-state-migration
  - external-backend-bootstrap
  - terraform-remote-state-s3
  - versioned-output-contract
  - saved-plan-apply
  - stable-for-each
  - dependency-ordered-destroy
objectives:
  - Configure partial backends without committing credentials or environment addresses
  - Migrate an existing local state while preserving every managed resource address
  - Publish and validate an explicit versioned contract across independent states
  - Save inspect and apply plans in producer-before-consumer order
  - Destroy dependent states in consumer-before-producer order
invariants:
  - Candidate work is Terraform HCL only
  - Canonical tests use only Terraform 1.6 test syntax
  - Backend infrastructure is external to both workload states
  - Every AWS request targets an explicit loopback LocalStack origin
  - No state push force unlock manual lock injection or lock bypass is used
  - Cleanup leaves no challenge-owned bucket object state or lock table
