id: challenge-57
title: Provider lock upgrade and dual-region S3 module routing
score: 95
alignment: A
exam_timebox: 75m
study_timebox: 130m
runtime:
  terraform: "1.6.6"
  providers:
    - "root hashicorp/aws ~> 5.100.0"
    - "child hashicorp/aws >= 5.90.0, < 6.0.0"
  target: localstack
  services: [s3, sts]
objectives:
  - Reconcile root and child provider version constraints through an audited lock upgrade
  - Declare and explicitly map two child-module provider aliases
  - Compile a strict release catalog into stable semantic module instances
  - Prove provider routing, scoped rollout, drift repair, and zero residue
invariants:
  - readonly init rejects the injected 5.99.0 selection before upgrade
  - upgraded lock selection is exactly AWS provider 5.100.0
  - primary and replica resources bind only to their explicit provider slots
  - catalog order never changes resource identity
  - candidate manages only S3 bucket and object resources
verification:
  canonical_runs: 13
  lockfile_readonly_failure: true
  lockfile_upgrade: true
  saved_plan_json: true
  provider_routing_audit: true
  full_e2e: true
  reorder_clean: true
  scoped_rollout: true
  drift_repair: true
  reverse_destroy: true
  zero_residue: true
