id: challenge-56
title: Stable random placement and non-disruptive EC2 canary delivery
score: 95
alignment: A
exam_timebox: 75m
study_timebox: 130m
runtime:
  terraform: "~> 1.6"
  providers:
    - "hashicorp/aws ~> 5.100.0"
    - "hashicorp/random ~> 3.7"
  target: localstack
  services: [ec2, sts]
objectives:
  - Compile a strict seven-field CSV into deterministic fleet objects
  - Use random_integer keepers as an explicit placement-generation contract
  - Resolve grader-owned AMI and subnet facts through official AWS data sources
  - Prove reorder stability, scoped replacement, drift repair, and zero residue
invariants:
  - fleet_id is the only graph identity
  - row order never changes placement or resource addresses
  - only placement_epoch may rotate a fleet placement
  - candidate never manages VPC, subnet, or AMI resources
  - every AWS request targets explicit loopback LocalStack with test credentials
verification:
  canonical_runs: 13
  full_e2e: true
  saved_plan_json: true
  reorder_clean: true
  controlled_replacement: true
  drift_repair: true
  zero_residue: true
