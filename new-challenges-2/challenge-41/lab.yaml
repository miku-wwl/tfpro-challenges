id: challenge-41
title: Legacy release takeover with zero-replacement module migration
difficulty: expert
score: 95
alignment: A
timebox_minutes: 70
terraform_version: "~> 1.6"
provider_version: "~> 5.100"
services: [iam, s3, sts]
objectives:
  - Normalize and validate a JSON service catalog with independent checks
  - Replace count identity with stable module for_each keys
  - Encode six legacy-to-module moves in reviewable HCL
  - Prove a real same-lineage migration has only no-op actions
  - Detect and precisely repair object drift before audited destroy
constraints:
  - Candidate contains Terraform HCL only
  - Only official core S3 and IAM resource types are managed
  - LocalStack endpoints are explicit loopback root origins
  - Credentials are literal test/test with required skip flags
verification:
  canonical_runs: 7
  full_e2e: true
  saved_plan_json: true
  reorder_clean: true
  drift_repair: true
  reverse_destroy: true
  zero_residue: true
