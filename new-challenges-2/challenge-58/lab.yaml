id: challenge-58
title: Declarative IAM import and legacy address refactor
score: 95
alignment: A
exam_timebox: 75m
study_timebox: 130m
runtime:
  terraform: "1.6.6"
  providers:
    - "hashicorp/aws ~> 5.100.0"
  target: localstack
  services: [iam, sts]
objectives:
  - Encode declarative imports for existing IAM role, policy, and attachment objects
  - Preserve state lineage through reviewable count-to-module moved blocks
  - Compile strict identity input into canonical trust and permission documents
  - Prove no-create takeover, scoped policy rollout, drift repair, and zero residue
invariants:
  - api objects move from legacy count addresses without replacement
  - worker objects import from remote IAM without create or delete
  - CLI terraform import and terraform state mv are prohibited
  - candidate manages only official IAM role, policy, and attachment types
  - every AWS request targets explicit loopback LocalStack with test credentials
verification:
  canonical_runs: 11
  declarative_import: true
  moved_address_refactor: true
  saved_plan_json: true
  no_create_takeover: true
  reorder_clean: true
  scoped_policy_rollout: true
  drift_repair: true
  reverse_destroy: true
  zero_residue: true
