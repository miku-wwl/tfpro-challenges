id: challenge-43
title: JSON-driven canonical IAM permission compiler
difficulty: expert
score: 95
alignment: A
timebox_minutes: 70
terraform_version: "~> 1.6"
provider_version: "~> 5.100"
services: [iam, sts]
objectives:
  - Validate nested JSON schemas and independent semantic invariants
  - Canonicalize identities, principals, statements, actions, and resources
  - Compile trust and permission JSON with aws_iam_policy_document
  - Prove a one-policy semantic update from saved-plan JSON
  - Detect and restore one externally detached role policy attachment
constraints:
  - Candidate contains Terraform HCL only
  - No mock providers, overrides, candidate scripts, or hand-built policy JSON
  - Only official IAM resources and caller/session/policy-document data are allowed
  - IAM and STS endpoints use an explicit loopback HTTP root origin
verification:
  canonical_runs: 21
  full_e2e: true
  saved_plan_json: true
  reorder_clean: true
  policy_upgrade: true
  drift_repair: true
  reverse_destroy: true
  zero_residue: true
